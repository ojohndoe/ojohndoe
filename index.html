<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultoria IA & Motor BBS RPG</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; font-family: monospace; background-color: #0d1117; color: #c9d1d9; overflow: hidden; }
        
        /* Estrutura de Quadros Flexbox (10% | 80% | 10%) */
        .main-container { display: flex; height: 100vh; width: 100vw; }
        
        .frame-left { flex: 0 0 10%; background-color: #161b22; border-right: 2px solid #30363d; padding: 12px; font-size: 0.8rem; overflow-y: auto; }
        .frame-center { flex: 0 0 80%; background-color: #0d1117; display: flex; flex-direction: column; height: 100%; }
        .frame-right { flex: 0 0 10%; background-color: #161b22; border-left: 2px solid #30363d; padding: 12px; font-size: 0.8rem; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        iframe { width: 100%; height: 100%; border: none; background: #0d1117; }
        
        h3 { color: #58a6ff; margin-bottom: 8px; border-bottom: 1px solid #30363d; padding-bottom: 3px; font-size: 0.85rem;}
        .menu-link { display: block; background: #21262d; color: #58a6ff; text-decoration: none; padding: 8px; margin-bottom: 6px; border-radius: 4px; text-align: center; font-size: 0.75rem; border: 1px solid #30363d; }
        .menu-link:hover { background: #30363d; color: #79c0ff; }
        
        .ad-box { border: 1px dashed #8b949e; padding: 15px 5px; text-align: center; color: #8b949e; border-radius: 4px; font-style: italic; font-size: 0.75rem; background: #0d1117; }
        .concorrencia { border: 1px solid #f85149; color: #f85149; }
    </style>
</head>
<body>

    <div class="main-container">
        <aside class="frame-left">
            <h3>Menu Consultoria</h3>
            <a href="game.html" target="conteudo-frame" class="menu-link">🎮 Executar Jogo</a>
            <a href="canvas_animation.html" target="conteudo-frame" class="menu-link">📐 Fluxo Canvas</a>
            
            <h3 style="margin-top:20px;">Filtros do Mapa</h3>
            <div id="links-dinamicos">
                <a href="game.html?view=list" target="conteudo-frame" class="menu-link" style="color:#79c0ff;">👥 101 Cidadãos</a>
                <a href="game.html?view=jornais" target="conteudo-frame" class="menu-link" style="color:#d2a8ff;">📰 Imprensa</a>
                <a href="game.html?view=mus" target="conteudo-frame" class="menu-link" style="color:#ff7b72;">🪖 Unidades MU</a>
            </div>
        </aside>

        <main class="frame-center">
            <iframe name="conteudo-frame" src="game.html"></iframe>
        </main>

        <aside class="frame-right">
            <h3>Ads & Parcerias</h3>
            <div class="ad-box">⚡ Projetos Elétricos e I.A.</div>
            <div class="ad-box">🤖 Redes e Algoritmos</div>
            
            <h3>Mercado Direto</h3>
            <div class="ad-box concorrencia">⚔️ Soluções Rivais<br><span style="font-size:0.65rem; display:block; margin-top:5px; color:#8b949e;">Contratação por escolha e confiança assíncrona.</span></div>
        </aside>
    </div>

</body>
</html>
